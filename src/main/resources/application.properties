spring.application.name=CleanCityBackend
server.port=${PORT:8080}
spring.config.import=optional:file:.env

DB_URL=jdbc:postgresql://localhost:5432/clean_city
DB_USERNAME=postgres
DB_PASSWORD=KrishnaP@1903

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwtSecret=${JWT_SECRET:4f4d2f8016467389a9f4c3ecf52d5b62b083b4b60098f489f6b98ea6fbd4b6dc}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:900000}
app.jwtRefreshExpirationMs=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Multipart configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# AWS S3 Configuration
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:cleancity-reports}
aws.region=${AWS_REGION:ap-south-1}
aws.access-key-id=${AWS_ACCESS_KEY_ID:your_access_key_placeholder}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:your_secret_key_placeholder}
